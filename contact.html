<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Willow Creek Puppies</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container">
            <a href="index.html" class="logo">Willow Creek Puppies</a>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="page-content container" style="max-width: 600px;">
        <h1 style="color: var(--primary-color); margin-bottom: 20px;">Get in Touch</h1>
        <p>Interested in one of our puppies? Have questions about our upcoming litters? Send us a message!</p>
        
        <form action="mailto:your-email@example.com" method="post" enctype="text/plain" style="margin-top: 30px;">
            <div class="form-group">
                <label for="name">Your Name</label>
                <input type="text" id="name" name="Name" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="Email" required>
            </div>
            <div class="form-group">
                <label for="message">Message (Please mention which puppy you are interested in)</label>
                <textarea id="message" name="Message" rows="5" required></textarea>
            </div>
            <button type="submit" class="btn">Send Message</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2024 Willow Creek Puppies. All rights reserved.</p>
    </footer>
</body>
</html>
