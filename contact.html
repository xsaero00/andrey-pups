<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Planida Paws</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container">
            <a href="index.html" class="logo">🐾 Planida Paws</a>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="page-content container" style="max-width: 600px;">
        <h1 style="color: var(--primary-color); margin-bottom: 20px; text-align: center;">Get in Touch</h1>
        <p style="text-align: center; margin-bottom: 30px;">Interested in one of our puppies? Have questions about our upcoming litters? The Planida family would love to hear from you!</p>
        
        <form action="mailto:hello@planidapaws.com" method="post" enctype="text/plain" style="background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
            <div class="form-group">
                <label for="name">Your Name</label>
                <input type="text" id="name" name="Name" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="Email" required>
            </div>
            <div class="form-group">
                <label for="message">Message (Please mention which puppy you are interested in)</label>
                <textarea id="message" name="Message" rows="5" required></textarea>
            </div>
            <button type="submit" class="btn" style="width: 100%; margin-bottom: 0;">Send Message</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 Planida Paws. Raised with love in Fair Oaks, CA. All rights reserved.</p>
    </footer>
</body>
</html>
